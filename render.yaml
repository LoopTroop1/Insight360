services:
  - type: web
    name: eoffice-pro
    runtime: node
    plan: free
    buildCommand: npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss && npm run start
    envVars:
      - key: DATABASE_URL
        value: file:./dev.db
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
